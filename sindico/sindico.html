<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Síndico — Comunica Síndico</title>

<link rel="manifest" href="./manifest-sindico.json">
<meta name="theme-color" content="#0c2338">

<style>
:root{
  --card:rgba(12,35,56,.95);
  --line:rgba(255,255,255,.15);
  --txt:#eaf2ff;
}

*{ box-sizing:border-box; }

html, body{
  margin:0;
  padding:0;
  min-height:100%;
  overflow:auto;
  -webkit-overflow-scrolling:touch;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:
    linear-gradient(180deg, rgba(0,0,0,.35), rgba(0,0,0,.65)),
    url("../tubarao01.jpg") center/cover no-repeat fixed;
  color:var(--txt);
  padding:20px;
}

/* ============================
   DESKTOP CENTRALIZADO
============================ */
@media (min-width:769px){
  body{
    display:flex;
    justify-content:center;
    align-items:center;
  }
}

/* ============================
   MOBILE COMPACTO PREMIUM
============================ */
@media (max-width:768px){

  body{
    display:block;
    padding:16px;
  }

  .card{
    width:100%;
    max-width:380px;  /* 🔥 mais compacto */
    margin:0 auto;
    padding:20px 18px;
  }

  h1{
    font-size:18px;
    margin-bottom:20px;
  }

  .actions{
    gap:12px;
  }

  .btn{
    font-size:14px;
    padding:10px 12px; /* 🔥 menor altura */
    border-radius:12px;
  }
}

/* ============================
   CARD
============================ */
.card{
  width:100%;
  max-width:480px;
  margin:0 auto;
  background:var(--card);
  border-radius:20px;
  padding:28px 22px;
  text-align:center;
  border:1px solid var(--line);
  backdrop-filter:blur(8px);
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* ============================
   TÍTULO
============================ */
h1{
  margin:0 0 24px 0;
  font-size:22px;
}

/* ============================
   BOTÕES
============================ */
.actions{
  display:flex;
  flex-direction:column;
  gap:16px;
  width:100%;
  align-items:center;
}

.btn{
  width:100%;
  max-width:360px; /* 🔥 centraliza e limita largura */
  padding:14px;
  border-radius:14px;
  font-size:15px;
  font-weight:700;
  border:none;
  cursor:pointer;
  transition:.2s;
}

.btn-cond{
  background:#3498db;
  color:#fff;
}

.btn-sind{
  background:#2ecc71;
  color:#fff;
}

.btn:hover{
  transform:scale(1.02);
}
</style>
</head>

<body>

<div class="card">

<h1>🏢 Comunica Síndico</h1>

<div class="actions">

<button class="btn btn-cond" onclick="irCondominos()">
📣 Entrar em Condôminos
</button>

<button class="btn btn-sind" onclick="irSindico()">
🛠️ Entrar no Painel do Síndico
</button>

</div>

</div>

<script>
function irCondominos(){
  window.location.href =
  "/comunica-sindico/index.html?ts=" + Date.now();
}

function irSindico(){
  window.location.href =
    "https://script.google.com/macros/s/AKfycbxpUSVwkwgscnENvb37KpbapYy886hYmYtMFaWI1qEUGpQ0LppbXJPZbxKggkSR1wRv/exec?ts=" + Date.now();
}
</script>

<script>
if ("serviceWorker" in navigator) {

  navigator.serviceWorker.register("/comunica-sindico/sw.js", {
    scope: "/comunica-sindico/"
  }).then(reg => {
    reg.update();
  });

  navigator.serviceWorker.addEventListener("message", event => {
    if (event.data && event.data.type === "NEW_VERSION") {
      window.location.reload();
    }
  });

}
</script>

</body>
</html>

<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Síndico — Comunica Síndico</title>

<!-- =====================================================
ITEM 001 — MANIFEST E META
===================================================== -->
<link rel="manifest" href="./manifest-sindico.json">
<meta name="theme-color" content="#0c2338">

<!-- =====================================================
ITEM 002 — VARIÁVEIS GLOBAIS
===================================================== -->
<style>
:root{
  --bg:#061726;
  --card:rgba(12,35,56,.85);
  --txt:#ffffff;
  --line:rgba(255,255,255,.15);
  --radius:18px;
}

/* =====================================================
ITEM 003 — BASE GLOBAL
===================================================== */
*{box-sizing:border-box}
body{
  margin:0;
  background:linear-gradient(180deg,#081a2b,#061726);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  color:var(--txt);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* =====================================================
ITEM 004 — CARD PRINCIPAL
===================================================== */
.card{
  width:min(1100px,100%);
  height:min(95vh,700px);
  background:var(--card);
  border-radius:var(--radius);
  padding:25px;
  display:flex;
  flex-direction:column;
  gap:18px;
  overflow:hidden;
}

/* =====================================================
ITEM 005 — LOGIN VERTICAL
===================================================== */
.login{
  display:flex;
  flex-direction:column;
  gap:14px;
  align-items:center;
  justify-content:center;
  height:100%;
}

.login input{
  width:260px;
  padding:14px;
  border-radius:999px;
  border:none;
  text-align:center;
  font-size:16px;
}

.btn{
  width:260px;
  padding:14px;
  border-radius:999px;
  border:none;
  font-weight:700;
  font-size:15px;
  cursor:pointer;
  background:#113b63;
  color:#fff;
}

.btn:hover{filter:brightness(1.1)}

/* =====================================================
ITEM 006 — PAINEL HORIZONTAL
===================================================== */
.painel{
  display:none;
  flex-direction:column;
  height:100%;
}

.registros{
  flex:1;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
  overflow:hidden;
}

.registro{
  background:rgba(255,255,255,.05);
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  font-size:14px;
  overflow:hidden;
}

.registro h3{
  margin:0 0 6px 0;
  font-size:16px;
}

.small{
  font-size:12px;
  opacity:.8;
}

/* =====================================================
ITEM 007 — RESPONSIVIDADE CELULAR
===================================================== */
@media(max-width:768px){
  .card{
    height:100vh;
    border-radius:0;
  }
  .registros{
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  }
}
</style>
</head>

<body>

<div class="card">

<!-- =====================================================
ITEM 008 — BLOCO LOGIN
===================================================== -->
<div class="login" id="loginArea">
  <h2>Painel do Síndico</h2>

  <input type="password" id="senha" placeholder="Senha">

  <button class="btn" onclick="acessar()">Acessar</button>

  <button class="btn" onclick="registrarFace()">Registrar FaceID</button>

  <button class="btn" onclick="entrarFace()">Entrar com FaceID</button>
</div>

<!-- =====================================================
ITEM 009 — BLOCO PAINEL
===================================================== -->
<div class="painel" id="painelArea">

  <h2>Registros do Condomínio</h2>

  <div class="registros">

    <div class="registro">
      <div>
        <h3>Título</h3>
        <div>Prioridade: Alta</div>
        <div>Emergência: Sim</div>
      </div>
      <div class="small">
        Local: Garagem<br>
        Início: 08:00<br>
        Fim: 12:00
      </div>
    </div>

    <div class="registro">
      <div>
        <h3>Manutenção Elevador</h3>
        <div>Prioridade: Média</div>
        <div>Emergência: Não</div>
      </div>
      <div class="small">
        Local: Bloco B<br>
        Início: 14:00<br>
        Fim: 18:00
      </div>
    </div>

  </div>

</div>

</div>

<!-- =====================================================
ITEM 010 — SCRIPT LOGIN
===================================================== -->
<script>

function acessar(){
  const senha = document.getElementById("senha").value;
  if(senha === "1234"){ // 🔐 altere aqui depois
    document.getElementById("loginArea").style.display="none";
    document.getElementById("painelArea").style.display="flex";
  }else{
    alert("Senha incorreta");
  }
}

function registrarFace(){
  localStorage.setItem("faceID","ok");
  alert("FaceID registrado neste dispositivo.");
}

function entrarFace(){
  if(localStorage.getItem("faceID")==="ok"){
    document.getElementById("loginArea").style.display="none";
    document.getElementById("painelArea").style.display="flex";
  }else{
    alert("FaceID não registrado.");
  }
}

</script>

</body>
</html>

<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Síndico — Comunica Síndico</title>

<!-- =====================================================
ITEM 001 — MANIFEST E META
===================================================== -->
<link rel="manifest" href="./manifest-sindico.json">
<meta name="theme-color" content="#0c2338">

<!-- =====================================================
ITEM 002 — VARIÁVEIS
===================================================== -->
<style>
:root{
  --bg:#081a2b;
  --card:#0f2f4f;
  --txt:#ffffff;
  --line:rgba(255,255,255,.15);
  --radius:18px;

  --alta:#ff3b3b;
  --media:#ffb300;
  --baixa:#00d084;
}

/* =====================================================
ITEM 003 — BASE
===================================================== */
*{box-sizing:border-box}
body{
  margin:0;
  background:linear-gradient(180deg,#061726,#081a2b);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  color:var(--txt);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* =====================================================
ITEM 004 — CARD
===================================================== */
.card{
  width:min(1200px,100%);
  height:95vh;
  background:var(--card);
  border-radius:var(--radius);
  padding:22px;
  display:flex;
  flex-direction:column;
  gap:18px;
  overflow:hidden;
}

/* =====================================================
ITEM 005 — LOGIN
===================================================== */
.login{
  display:flex;
  flex-direction:column;
  gap:14px;
  align-items:center;
  justify-content:center;
  height:100%;
}
.login input{
  width:260px;
  padding:14px;
  border-radius:999px;
  border:none;
  text-align:center;
}
.btn{
  width:260px;
  padding:14px;
  border-radius:999px;
  border:none;
  font-weight:700;
  cursor:pointer;
  background:#123b63;
  color:#fff;
}
.btn:hover{filter:brightness(1.1)}

/* =====================================================
ITEM 006 — PAINEL
===================================================== */
.painel{
  display:none;
  flex-direction:column;
  height:100%;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.registros{
  flex:1;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:14px;
  overflow:hidden;
}

.registro{
  border-radius:14px;
  padding:14px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--line);
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.registro.alta{border-left:6px solid var(--alta)}
.registro.media{border-left:6px solid var(--media)}
.registro.baixa{border-left:6px solid var(--baixa)}

.small{font-size:12px;opacity:.8}

/* =====================================================
ITEM 007 — MODO TV
===================================================== */
.tv .card{
  border-radius:0;
  height:100vh;
}
.tv .registros{
  grid-template-columns:repeat(4,1fr);
}

/* =====================================================
ITEM 008 — RESPONSIVO
===================================================== */
@media(max-width:768px){
  .card{height:100vh;border-radius:0}
  .registros{grid-template-columns:repeat(auto-fit,minmax(160px,1fr))}
}
</style>
</head>

<body>

<div class="card">

<!-- =====================================================
ITEM 009 — LOGIN
===================================================== -->
<div class="login" id="loginArea">
  <h2>Painel do Síndico</h2>
  <input type="password" id="senha" placeholder="Senha">

  <button class="btn" onclick="acessar()">Acessar</button>
  <button class="btn" onclick="registrarFace()">Registrar FaceID</button>
  <button class="btn" onclick="entrarFace()">Entrar com FaceID</button>
</div>

<!-- =====================================================
ITEM 010 — PAINEL PRINCIPAL
===================================================== -->
<div class="painel" id="painelArea">

  <div class="header">
    <h2>Registros do Condomínio</h2>
    <div id="hora"></div>
  </div>

  <div class="registros" id="listaRegistros"></div>

</div>

</div>

<!-- =====================================================
ITEM 011 — SCRIPT PRINCIPAL
===================================================== -->
<script>

// 🔐 ALTERAR DEPOIS
const SENHA_PADRAO = "1234";

// 🌐 URL DO APPS SCRIPT
const API_URL = "https://script.google.com/macros/s/AKfycbyBHEhubiPa5Oif5T68PzrahDbYHpw5LDfZ0oHD_E7ozCYEk62xCVGk648ITzH-eehQ/exec";

function acessar(){
  if(document.getElementById("senha").value === SENHA_PADRAO){
    abrirPainel();
  }else{
    alert("Senha incorreta");
  }
}

function registrarFace(){
  localStorage.setItem("faceID","ok");
  alert("FaceID registrado.");
}

function entrarFace(){
  if(localStorage.getItem("faceID")==="ok"){
    abrirPainel();
  }else{
    alert("FaceID não registrado.");
  }
}

function abrirPainel(){
  document.getElementById("loginArea").style.display="none";
  document.getElementById("painelArea").style.display="flex";
  carregarRegistros();
  setInterval(atualizarHora,1000);
}

function atualizarHora(){
  document.getElementById("hora").textContent =
    new Date().toLocaleTimeString("pt-BR");
}

async function carregarRegistros(){
  try{
    const res = await fetch(API_URL + "?ts=" + Date.now());
    const dados = await res.json();
    renderizar(dados);
  }catch(e){
    console.log("Erro API, usando demo");
    renderizar(dadosDemo());
  }
}

function renderizar(lista){
  const container = document.getElementById("listaRegistros");
  container.innerHTML="";

  lista.forEach(item=>{
    const div = document.createElement("div");
    div.className = "registro " + item.prioridade.toLowerCase();

    div.innerHTML = `
      <div>
        <h3>${item.titulo}</h3>
        <div>Prioridade: ${item.prioridade}</div>
        <div>Emergência: ${item.emergencia}</div>
      </div>
      <div class="small">
        Local: ${item.local}<br>
        Início: ${item.inicio}<br>
        Fim: ${item.fim}
      </div>
    `;

    container.appendChild(div);
  });
}

function dadosDemo(){
  return [
    {titulo:"Vazamento Garagem",prioridade:"Alta",emergencia:"Sim",local:"Garagem",inicio:"08:00",fim:"12:00"},
    {titulo:"Limpeza Piscina",prioridade:"Média",emergencia:"Não",local:"Piscina",inicio:"14:00",fim:"16:00"},
    {titulo:"Troca Lâmpadas",prioridade:"Baixa",emergencia:"Não",local:"Bloco C",inicio:"10:00",fim:"11:00"}
  ];
}

/* =====================================================
ITEM 012 — DETECTAR MODO TV (?tv=1)
===================================================== */
if(new URLSearchParams(window.location.search).get("tv") === "1"){
  document.body.classList.add("tv");
}

</script>

</body>
</html>

<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="format-detection" content="telephone=no,date=no,address=no,email=no">
<title>Síndico — Comunica Síndico</title>

<link rel="manifest" href="./manifest-sindico.json">
<meta name="theme-color" content="#0c2338">

<link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192x192.png">
<link rel="apple-touch-icon" sizes="192x192" href="./icons/icon-192x192.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Síndico">

<style>
:root{
  --bg:#061726;
  --txt:#eaf2ff;
  --line:rgba(255,255,255,.15);
  --card:rgba(12,35,56,.88);
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:
    linear-gradient(180deg, rgba(0,0,0,.25), rgba(0,0,0,.55)),
    url("../tubarao01.jpg") center/cover no-repeat fixed;
  color:var(--txt);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
}

/* ✅ CARD COM ALTURA CONTROLADA */
.card{
  width:min(980px,100%);
  max-height:95vh;
  overflow:auto; /* 🔥 permite mostrar tudo */
  background:var(--card);
  border:1px solid var(--line);
  border-radius:22px;
  padding:26px;
  box-shadow:0 14px 40px rgba(0,0,0,.45);
  text-align:center;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

/* SCROLL BONITO */
.card::-webkit-scrollbar{
  width:8px;
}
.card::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,.3);
  border-radius:10px;
}

.badge{
  display:inline-block;
  padding:8px 12px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.2);
  font-size:12px;
  margin-bottom:12px;
  opacity:.9;
}

h1{
  margin:0 0 10px 0;
  font-size:28px;
  font-weight:900;
}

p{
  margin:0 0 16px 0;
  opacity:.9;
  line-height:1.4;
  font-size:16px;
}

/* 🔥 BOTÕES SEMPRE VISÍVEIS */
.actions{
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:14px;
}

.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.22);
  background:rgba(15,47,79,.95);
  color:var(--txt);
  padding:14px 22px;
  font-weight:900;
  font-size:15px;
  text-decoration:none;
  cursor:pointer;
  min-width:220px;
  transition:.2s;
}

.btn:hover{
  filter:brightness(1.1);
  transform:scale(1.03);
}

.mini{
  margin-top:16px;
  font-size:13px;
  opacity:.75;
}

/* ✅ RESPONSIVO CELULAR */
@media(max-width:768px){

  body{
    padding:10px;
    align-items:flex-start;
  }

  .card{
    max-height:none;
    height:auto;
    border-radius:14px;
  }

  .actions{
    flex-direction:column;
    align-items:center;
  }

  .btn{
    width:100%;
    max-width:320px;
  }

  h1{
    font-size:22px;
  }

  p{
    font-size:14px;
  }
}
</style>
</head>

<body>
<div class="card">

  <div class="badge" id="mode">Carregando...</div>

  <h1>🏢 Síndico — Comunica Síndico</h1>

  <p>
    Painel do Síndico para acompanhamento do condomínio,
    alertas, avisos, vídeos e informações em tempo real.
  </p>

  <div class="actions">
    <a class="btn" href="/comunica-sindico/index.html?ts=1">
      📣 Condôminos
    </a>

    <a class="btn" href="#" id="btnPainelSindico">
      🛠️ Painel do Síndico
    </a>
  </div>

  <p class="mini" id="hint">
    Instale este app pelo menu do navegador (Adicionar à tela inicial).
  </p>

</div>

<script>
(function(){
  const mode = document.getElementById("mode");
  const hint = document.getElementById("hint");

  const isStandalone =
    (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches) ||
    (window.navigator.standalone === true);

  mode.textContent = isStandalone ? "Modo App (instalado)" : "Modo Navegador";
  hint.textContent = isStandalone
    ? "App do Síndico instalado. Use os botões acima."
    : "Instale este app pelo menu do navegador (Adicionar à tela inicial).";
})();

const PAINEL_SINDICO_URL =
"https://script.google.com/macros/s/AKfycbyBHEhubiPa5Oif5T68PzrahDbYHpw5LDfZ0oHD_E7ozCYEk62xCVGk648ITzH-eehQ/exec";

document.getElementById("btnPainelSindico")
.addEventListener("click", function(e){
  e.preventDefault();
  const url = PAINEL_SINDICO_URL + "?ts=" + Date.now();
  window.open(url, "_blank", "noopener");
});

if ("serviceWorker" in navigator) {
  const base = "/comunica-sindico/";
  navigator.serviceWorker.register(base + "sw.js", { scope: base });
}
</script>

</body>
</html>

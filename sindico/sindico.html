<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Síndico — Comunica Síndico</title>

<link rel="manifest" href="./manifest-sindico.json">
<meta name="theme-color" content="#0c2338">

<style>
:root{
  --card:rgba(12,35,56,.92);
  --line:rgba(255,255,255,.15);
  --txt:#eaf2ff;
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:
    linear-gradient(180deg, rgba(0,0,0,.3), rgba(0,0,0,.6)),
    url("../tubarao01.jpg") center/cover no-repeat fixed;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  color:var(--txt);
}

.card{
  width:min(480px,100%);
  background:var(--card);
  border-radius:20px;
  padding:40px 30px;
  text-align:center;
  border:1px solid var(--line);
  backdrop-filter:blur(8px);
}

h1{
  margin:0 0 30px 0;
  font-size:24px;
}

.actions{
  display:flex;
  flex-direction:column;
  gap:18px;
}

.btn{
  padding:16px;
  border-radius:14px;
  font-size:16px;
  font-weight:700;
  border:none;
  cursor:pointer;
  transition:.2s;
}

.btn-cond{
  background:#3498db;
  color:#fff;
}

.btn-sind{
  background:#2ecc71;
  color:#fff;
}

.btn:hover{
  transform:scale(1.03);
}
</style>
</head>

<body>

<div class="card">

<h1>🏢 Comunica Síndico</h1>

<div class="actions">

<button class="btn btn-cond"
onclick="irCondominos()">
📣 Entrar em Condôminos
</button>

<button class="btn btn-sind"
onclick="irSindico()">
🛠️ Entrar no Painel do Síndico
</button>

</div>

</div>

<script>

function irCondominos(){
  window.location.href =
  "/comunica-sindico/index.html?ts=" + Date.now();
}

function irSindico(){
  window.location.href =
  "https://script.google.com/macros/s/AKfycbyBHEhubiPa5Oif5T68PzrahDbYHpw5LDfZ0oHD_E7ozCYEk62xCVGk648ITzH-eehQ/exec?ts=" + Date.now();
}

</script>

</body>
</html>
